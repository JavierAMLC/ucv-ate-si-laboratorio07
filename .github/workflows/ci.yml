name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        working-directory: ./si-image-processing-lab
        run: poetry install --no-root

      - name: Run Ruff
        working-directory: ./si-image-processing-lab
        run: poetry run ruff check .

      - name: Run Tests
        working-directory: ./si-image-processing-lab
        run: poetry run pytest